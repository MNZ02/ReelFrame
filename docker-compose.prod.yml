# Production stack for the VM. Brings up Postgres, MinIO, the API + worker, and
# a Caddy reverse proxy. The web app now runs on Vercel (not here); Caddy only
# fronts the API, over HTTPS at the sslip.io hostname in deploy/Caddyfile.
#
#   cp .env.prod.example .env   # then fill in secrets + your public IP/domain
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm api bun run db:migrate
#
# Published ports: 80 + 443 (Caddy → API; 80 is for the Let's Encrypt HTTP-01
# challenge) and 9000 (MinIO S3 API — browser uploads/playback + the video
# provider fetch from it). Postgres/API stay on the internal network.
name: reelframe

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-higgsfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-higgsfield}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-higgsfield}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    ports:
      - "9000:9000" # S3 API — must be reachable by the browser and the video provider
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-media}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${S3_ACCESS_KEY}\" \"$${S3_SECRET_KEY}\"; do echo waiting for minio; sleep 2; done &&
      mc mb --ignore-existing local/\"$${S3_BUCKET}\" &&
      echo 'bucket ready'
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: reelframe-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["bun", "run", "start:api"]

  worker:
    image: reelframe-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["bun", "run", "start:worker"]

  # The web app is deployed on Vercel now — no web container on the VM.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80" # required for the Let's Encrypt HTTP-01 challenge
      - "443:443" # HTTPS for the API (browser + provider reach it here)
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  caddydata:
  caddyconfig:
