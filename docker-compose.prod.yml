# Production stack for a single VM (all-in-one). Brings up Postgres, MinIO,
# the API + worker, the Next.js web app, and a Caddy reverse proxy.
#
#   cp .env.prod.example .env   # then fill in secrets + your public IP/domain
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm api bun run db:migrate
#
# Only ports 80 (app) and 9000 (MinIO S3 API, for browser uploads/playback and
# the video provider) are published; Postgres/API/web stay on the internal
# network.
name: reelframe

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-higgsfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-higgsfield}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-higgsfield}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    ports:
      - "9000:9000" # S3 API — must be reachable by the browser and the video provider
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-media}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${S3_ACCESS_KEY}\" \"$${S3_SECRET_KEY}\"; do echo waiting for minio; sleep 2; done &&
      mc mb --ignore-existing local/\"$${S3_BUCKET}\" &&
      echo 'bucket ready'
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: reelframe-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["bun", "run", "start:api"]

  worker:
    image: reelframe-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["bun", "run", "start:worker"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env}
    image: reelframe-web
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  miniodata:
  caddydata:
  caddyconfig:
